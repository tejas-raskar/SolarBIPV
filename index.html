<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar v1.0</title>
  </head>
  <body>
    <div id="container">
      <div id="controls">
        <span>
          <label for="dateInput" style="margin-top: 8px;">Date:</label>
          <input type="date" id="dateInput">
        </span>
        <span>
          <label for="timeSlider" style="margin-top: 8px;">Time of the day:</label>
          <input type="range" id="timeSlider" min="0" max="1440" step="1">
          <span id="timeLabel">12:00</span>
        </span>
        <span>
          <label for="ghi" style="margin-top: 8px;">GHI: </label>
          <input type="number" id="ghi" value="5.5">
        </span>
      </div>
      <canvas id="bg"></canvas>
    </div>

    <div id="infoCard" class="card">
      <h3 id="buildingName"></h3>
      <p id="totalArea"></p>
      <p id="shadowFraction"></p>
      <p id="pvValue"></p>
    </div>
    
    <script type="module" src="/main.js"></script>
  </body>
</html>
